<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillBridge | Applied Jobs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="assets/img/skillbridge-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="jobs-library.css">
</head>
<body data-library-page="library">
  <main class="library-shell">
    <section class="library-topbar">
      <div class="library-links">
        <a class="nav-pill" id="libraryAppliedTab" href="applied-jobs.html?tab=applied">Applied Jobs</a>
        <a class="nav-pill" id="librarySavedTab" href="applied-jobs.html?tab=saved">Saved Jobs</a>
        <a class="nav-pill" href="smart-jobs.html">Smart Jobs</a>
        <a class="nav-pill" href="candidate-passport.html">Candidate Passport</a>
      </div>
      <a class="primary-btn" href="student-dashboard.html">Back to Dashboard</a>
    </section>

    <section class="library-hero">
      <div>
        <span class="library-kicker" id="libraryMode">Smart Tracker</span>
        <h1 id="libraryTitle">Jobs Library</h1>
        <p id="libraryCopy"></p>
      </div>
      <div class="library-summary">
        <span class="match-pill" id="libraryCount">0 Items</span>
        <span class="match-pill" id="libraryNextAction">Next: Review best match</span>
      </div>
      <div class="library-controls" aria-label="Library filters">
        <button class="filter-pill active" type="button" data-filter-status="all">All</button>
        <button class="filter-pill" type="button" data-filter-status="ready">Ready</button>
        <button class="filter-pill" type="button" data-filter-status="pending">Pending</button>
      </div>
    </section>

    <section class="library-grid" id="libraryGrid"></section>
    <section class="empty-state hidden" id="libraryEmpty">
      <h2>لا توجد وظائف هنا بعد</h2>
      <p>ابدأ من Smart Jobs ثم ارجع هنا لمراجعة Applied وSaved في مكان واحد.</p>
      <a class="primary-btn" href="smart-jobs.html">اذهب إلى Smart Jobs</a>
    </section>
  </main>

  <script src="jobs-library.js"></script>
</body>
</html>
